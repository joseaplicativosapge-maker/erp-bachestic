version: "3.8"
services:
  app:
    build:
      context: .
      args:
        GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=/data/bachestic.db
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

volumes:
  sqlite_data: